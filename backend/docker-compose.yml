services:
  postgres:
    # VERSION NOTE — VERIFY LOCALLY: PostgreSQL 18 was the current stable major as
    # of this module's research (18.4, released May 2026). PostgreSQL 19 is in beta
    # and not production-appropriate yet. This sandbox cannot pull images to confirm
    # the exact tag exists on Docker Hub — run `docker compose pull postgres` and
    # check hub.docker.com/_/postgres for the current patch tag before relying on this.
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    # VERSION NOTE — VERIFY LOCALLY: using the official Cisco Talos `stable` tag
    # rather than pinning a specific version, since ClamAV signature databases
    # need to track the current release to detect current threats — pinning an
    # old version here would be actively counterproductive, unlike pinning
    # Postgres/Java where stability matters more than freshness.
    #
    # OPERATIONAL NOTE for a low-budget VPS: ClamAV's docs recommend 2-4GB RAM
    # for clamd to hold virus signatures in memory. Confirm your pilot VPS has
    # enough headroom alongside Postgres + the app JVM, or this container will
    # get OOM-killed. Worth sizing the VPS around this constraint specifically,
    # not an afterthought.
    image: clamav/clamav:stable
    restart: unless-stopped
    ports:
      - "3310:3310"
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      # Generic TCP check rather than relying on an image-specific health script
      # whose exact path I'm not certain of from here — verify against ClamAV's
      # own Docker docs (docs.clamav.net) if you want their more thorough check.
      test: ["CMD-SHELL", "echo -n '' | timeout 5 nc -w 5 localhost 3310 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s   # first boot downloads the full signature DB — this takes minutes

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      # DB/JWT/ClamAV env vars are declared here now so later modules only need
      # to add application.yml placeholders, not touch this file again.
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy

volumes:
  postgres_data:
  clamav_db:
