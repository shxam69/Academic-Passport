spring:
  application:
    name: academic-passport-backend

server:
  port: 8080

# Database, Flyway, and Security configuration are deliberately absent here —
# they land in Module 3 (PostgreSQL + Flyway) and Module 5 (Authentication).
# A Module 1 scaffold that already assumes a running Postgres instance would
# make the context-load test below depend on infrastructure that doesn't
# exist yet in the Sprint 1 order.

logging:
  level:
    com.academicpassport: INFO
